global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
  - job_name: ingest
    static_configs:
      - targets: ["host.docker.internal:2112"]
  - job_name: simulator
    static_configs:
      - targets: ["host.docker.internal:8090"]
  - job_name: query-api
    static_configs:
      - targets: ["host.docker.internal:8082"]
